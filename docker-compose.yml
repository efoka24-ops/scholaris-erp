version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: scholaris
      POSTGRES_USER: scholaris
      POSTGRES_PASSWORD: scholaris_dev_password
    ports:
      - "5432:5432"
    volumes:
      - scholaris_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholaris -d scholaris"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  scholaris_pgdata:
