# Reverse proxy SCHOLARIS ERP — api:3001 (NestJS) + web:3000 (Next.js)
#
# Certificats Let's Encrypt / certbot :
#   1. Démarrer nginx en HTTP seul (commenter le bloc 443 ci-dessous la première fois).
#   2. Générer le certificat :
#        docker run --rm -v ./nginx/certbot/www:/var/www/certbot \
#          -v ./nginx/certbot/conf:/etc/letsencrypt certbot/certbot certonly \
#          --webroot -w /var/www/certbot -d votre-domaine.tld
#   3. Décommenter le bloc 443 + recharger nginx (docker exec scholaris-nginx nginx -s reload).
#   4. Renouvellement automatique : cron `0 3 * * * docker run --rm ... certbot renew`.

upstream scholaris_api {
    server api:3001;
    keepalive 32;
}

upstream scholaris_web {
    server web:3000;
    keepalive 32;
}

# ---- HTTP : redirection vers HTTPS + challenge ACME ----
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS ----
server {
    listen 443 ssl http2;
    server_name _;

    # Certificats (montés en volume, voir docker-compose.production.yml)
    ssl_certificate     /etc/letsencrypt/live/votre-domaine.tld/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/votre-domaine.tld/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # En-têtes de sécurité de base
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ---- API NestJS ----
    location /api/ {
        proxy_pass http://scholaris_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ---- Assets statiques Next.js : cache long (fichiers hashés, immuables) ----
    location /_next/static/ {
        proxy_pass http://scholaris_web;
        proxy_set_header Host $host;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 365d;
    }

    # ---- Application Next.js ----
    location / {
        proxy_pass http://scholaris_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
